# Docker Compose - 生产环境
# 主系统: Next.js (根目录)
# 辅助服务: FastAPI (web/backend/)
version: '3.8'

services:
  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: ariba-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - web
      - backend
    networks:
      - ariba-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 主系统 - Next.js 生产服务
  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ariba-web
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
    networks:
      - ariba-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 辅助服务 - FastAPI 后端 (可选)
  backend:
    build:
      context: ./web/backend
      dockerfile: ../../Dockerfile.backend
    container_name: ariba-backend
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=production
      - ARIBAS_LOG_LEVEL=INFO
      - ARIBAS_CACHE__ENABLED=true
      - ARIBAS_CACHE__TTL=3600
    volumes:
      - app-data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - ariba-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Prometheus 监控 (可选)
  prometheus:
    image: prom/prometheus:latest
    container_name: ariba-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ariba-network

  # Grafana 监控面板 (可选)
  grafana:
    image: grafana/grafana:latest
    container_name: ariba-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ariba-network

volumes:
  app-data:
  nginx-logs:
  prometheus-data:
  grafana-data:

networks:
  ariba-network:
    driver: bridge
