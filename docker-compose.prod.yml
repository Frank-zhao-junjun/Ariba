# Docker Compose - 生产环境
version: '3.8'

services:
  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: ariba-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - ariba-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端API服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ariba-backend
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=production
      - ARIBAS_LOG_LEVEL=INFO
      - ARIBAS_CACHE__ENABLED=true
      - ARIBAS_CACHE__TTL=3600
      - ARIBAS_DB__HOST=postgres
      - ARIBAS_DB__PORT=5432
    volumes:
      - app-data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - ariba-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端静态文件服务
  frontend:
    image: nginx:alpine
    container_name: ariba-frontend
    expose:
      - "80"
    volumes:
      - ./web/frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.frontend.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - ariba-network

  # Prometheus监控 (可选)
  prometheus:
    image: prom/prometheus:latest
    container_name: ariba-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ariba-network

  # Grafana监控面板 (可选)
  grafana:
    image: grafana/grafana:latest
    container_name: ariba-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ariba-network

networks:
  ariba-network:
    driver: bridge

volumes:
  app-data:
  nginx-logs:
  prometheus-data:
  grafana-data:
