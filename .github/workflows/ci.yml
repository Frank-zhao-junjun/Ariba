name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ==========================================
  # Phase 1: 最小 CI - Node 构建链
  # ==========================================
  node-build:
    name: Node.js Build Chain
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run linter
      run: pnpm lint .

    - name: Run TypeScript check
      run: pnpm ts-check

    - name: Build project
      run: pnpm build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.node-version }}
        path: |
          .next/
          dist/
        retention-days: 1

  # ==========================================
  # Phase 1: 最小 CI - Python 辅助服务
  # ==========================================
  python-backend:
    name: Python Backend
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'web/backend/requirements.txt'

    - name: Install dependencies
      working-directory: ./web/backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validate imports
      working-directory: ./web/backend
      run: |
        python -c "import fastapi; import uvicorn; print('Core imports OK')"
        python -c "from api_server import app; print('App import OK')"

    - name: Run tests if available
      working-directory: ./web/backend
      run: |
        if [ -d "tests" ] && [ "$(ls -A tests)" ]; then
          pip install pytest
          pytest tests/ -v || echo "Tests completed with warnings"
        else
          echo "No tests directory found, skipping"
        fi
      continue-on-error: true

  # ==========================================
  # Phase 1: 最小 CI - 配置一致性
  # ==========================================
  config-validation:
    name: Config Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ----------------------------------------
    # Docker Compose 配置验证
    # ----------------------------------------
    - name: Setup Docker
      uses: docker/setup-buildx-action@v3

    - name: Validate docker-compose.dev.yml
      run: docker compose -f docker-compose.dev.yml config

    - name: Validate docker-compose.prod.yml
      run: docker compose -f docker-compose.prod.yml config

    # ----------------------------------------
    # 关键文件存在性检查
    # ----------------------------------------
    - name: Check critical files exist
      run: |
        echo "Checking critical files..."
        test -f Dockerfile.frontend || (echo "Missing Dockerfile.frontend" && exit 1)
        test -f Dockerfile.backend || (echo "Missing Dockerfile.backend" && exit 1)
        test -f docker-compose.dev.yml || (echo "Missing docker-compose.dev.yml" && exit 1)
        test -f docker-compose.prod.yml || (echo "Missing docker-compose.prod.yml" && exit 1)
        test -f package.json || (echo "Missing package.json" && exit 1)
        test -f web/backend/requirements.txt || (echo "Missing requirements.txt" && exit 1)
        test -f web/backend/api_server.py || (echo "Missing api_server.py" && exit 1)
        echo "All critical files present!"

    # ----------------------------------------
    # Dockerfile 语法检查
    # ----------------------------------------
    - name: Lint Dockerfile.frontend
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile.frontend
        verbose: true
        failure-threshold: error
      continue-on-error: true

    - name: Lint Dockerfile.backend
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile.backend
        verbose: true
        failure-threshold: error
      continue-on-error: true

  # ==========================================
  # Phase 2: Docker 构建验证
  # ==========================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [node-build, python-backend, config-validation]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ----------------------------------------
    # 构建前端镜像
    # ----------------------------------------
    - name: Build frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.frontend
        push: false
        tags: ariba-web:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # ----------------------------------------
    # 构建后端镜像
    # ----------------------------------------
    - name: Build backend image
      uses: docker/build-push-action@v5
      with:
        context: ./web/backend
        file: ${{ github.workspace }}/Dockerfile.backend
        push: false
        tags: ariba-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # ----------------------------------------
    # 验证镜像可运行
    # ----------------------------------------
    - name: Test frontend image
      run: |
        docker run --rm -d -p 5000:5000 --name test-web ariba-web:latest
        sleep 15
        curl -f http://localhost:5000 || (docker logs test-web && exit 1)
        docker stop test-web

    - name: Test backend image
      run: |
        docker run --rm -d -p 8000:8000 --name test-backend ariba-backend:latest
        sleep 5
        curl -f http://localhost:8000/health || (docker logs test-backend && exit 1)
        docker stop test-backend
