<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能合同摘要生成器 v1.6 - Ariba实施助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    .header { text-align: center; color: white; margin-bottom: 30px; }
    .header h1 { font-size: 2rem; margin-bottom: 10px; }
    .header p { opacity: 0.9; }
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .input-section h2 { font-size: 1.2rem; color: #333; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    textarea { width: 100%; height: 200px; padding: 16px; border: 2px solid #e1e1e1; border-radius: 12px; font-size: 14px; resize: vertical; transition: border-color 0.3s; }
    textarea:focus { outline: none; border-color: #667eea; }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px 32px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-group { display: flex; gap: 12px; margin-top: 16px; }
    .result-section h2 { font-size: 1.2rem; color: #333; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .summary-box { background: #f8f9ff; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .summary-box h3 { color: #667eea; font-size: 1rem; margin-bottom: 12px; }
    .summary-text { color: #333; font-size: 15px; line-height: 1.8; }
    .overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .overview-item { background: #f0f4ff; padding: 12px 16px; border-radius: 8px; }
    .overview-item .label { font-size: 12px; color: #666; margin-bottom: 4px; }
    .overview-item .value { font-size: 14px; color: #333; font-weight: 600; }
    .clauses-list { display: flex; flex-direction: column; gap: 10px; }
    .clause-item { background: #f8f9ff; padding: 14px 16px; border-radius: 10px; border-left: 4px solid #667eea; }
    .clause-item.high { border-left-color: #e74c3c; }
    .clause-item.medium { border-left-color: #f39c12; }
    .clause-type { font-size: 12px; color: #667eea; font-weight: 600; margin-bottom: 6px; }
    .clause-content { font-size: 14px; color: #333; line-height: 1.5; }
    .risk-item { display: flex; gap: 12px; padding: 14px 16px; background: #fff5f5; border-radius: 10px; margin-bottom: 10px; }
    .risk-item.medium { background: #fffbf0; }
    .risk-item.low { background: #f0fff4; }
    .risk-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; height: fit-content; }
    .risk-badge.high { background: #e74c3c; color: white; }
    .risk-badge.medium { background: #f39c12; color: white; }
    .risk-badge.low { background: #27ae60; color: white; }
    .risk-content { flex: 1; }
    .risk-desc { font-size: 14px; color: #333; margin-bottom: 4px; }
    .risk-suggestion { font-size: 13px; color: #666; font-style: italic; }
    .highlights { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .highlight-tag { background: #e8f5e9; color: #27ae60; padding: 6px 12px; border-radius: 20px; font-size: 13px; }
    .loading { display: none; text-align: center; padding: 40px; color: #666; }
    .loading.show { display: block; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e1e1e1; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { background: #fee; color: #c00; padding: 16px; border-radius: 10px; margin-top: 16px; display: none; }
    .error.show { display: block; }
    .nav { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .nav a { color: white; text-decoration: none; padding: 10px 20px; background: rgba(255,255,255,0.2); border-radius: 8px; transition: background 0.2s; }
    .nav a:hover { background: rgba(255,255,255,0.3); }
    .nav a.active { background: white; color: #667eea; }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="/">🏠 首页</a>
      <a href="/requirement">📋 需求分析</a>
      <a href="/blueprint">🏗️ 蓝图设计</a>
      <a href="/invoice">📄 发票分析</a>
      <a href="/approval">✅ 审批助手</a>
      <a href="/contract-summary" class="active">📝 合同摘要</a>
    </nav>
    
    <header class="header">
      <h1>📝 智能合同摘要生成器</h1>
      <p>基于AI自动分析合同文本，生成结构化摘要，识别关键条款和风险点</p>
    </header>

    <div class="card input-section">
      <h2>📋 合同文本输入</h2>
      <textarea id="contractText" placeholder="请粘贴合同文本...

例如：
甲方：XXX公司
乙方：YYY公司
合同金额：人民币XXX万元
付款条件：...
交货期限：...
..."></textarea>
      <div class="btn-group">
        <button class="btn" onclick="generateSummary()">🔍 生成完整摘要</button>
        <button class="btn" onclick="generateBrief()">⚡ 一句话摘要</button>
        <button class="btn" onclick="loadDemo()" style="background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);">📊 加载演示</button>
      </div>
      <div class="error" id="errorMsg"></div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在分析合同，请稍候...</p>
    </div>

    <div class="card result-section" id="resultSection" style="display: none;">
      <h2>📊 分析结果</h2>
      
      <div class="summary-box">
        <h3>📝 一句话摘要</h3>
        <div class="summary-text" id="summaryText"></div>
      </div>

      <h3 style="margin: 20px 0 12px; color: #333;">📋 合同概览</h3>
      <div class="overview-grid" id="overviewGrid"></div>

      <h3 style="margin: 20px 0 12px; color: #333;">⚖️ 关键条款</h3>
      <div class="clauses-list" id="clausesList"></div>

      <h3 style="margin: 20px 0 12px; color: #333;">⚠️ 风险提示</h3>
      <div id="risksList"></div>

      <h3 style="margin: 20px 0 12px; color: #333;">✨ 亮点</h3>
      <div class="highlights" id="highlightsList"></div>
    </div>
  </div>

  <script>
    const API_BASE = '/api/contract-summary';

    async function generateSummary() {
      const text = document.getElementById('contractText').value.trim();
      if (!text || text.length < 50) {
        showError('请输入至少50字的合同内容');
        return;
      }

      showLoading(true);
      hideError();

      try {
        const response = await fetch(`${API_BASE}/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const result = await response.json();
        
        if (result.success) {
          displayResult(result.data);
        } else {
          showError(result.error || '生成失败');
        }
      } catch (error) {
        showError('网络错误，请稍后重试');
      } finally {
        showLoading(false);
      }
    }

    async function generateBrief() {
      const text = document.getElementById('contractText').value.trim();
      if (!text || text.length < 50) {
        showError('请输入至少50字的合同内容');
        return;
      }

      showLoading(true);
      hideError();

      try {
        const response = await fetch(`${API_BASE}/brief`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const result = await response.json();
        
        if (result.success) {
          document.getElementById('resultSection').style.display = 'block';
          document.getElementById('summaryText').textContent = result.brief;
        } else {
          showError(result.error || '生成失败');
        }
      } catch (error) {
        showError('网络错误，请稍后重试');
      } finally {
        showLoading(false);
      }
    }

    async function loadDemo() {
      showLoading(true);
      
      try {
        const response = await fetch(`${API_BASE}/demo`);
        const result = await response.json();
        
        if (result.success) {
          displayResult(result.data);
        }
      } catch (error) {
        showError('加载演示数据失败');
      } finally {
        showLoading(false);
      }
    }

    function displayResult(data) {
      document.getElementById('resultSection').style.display = 'block';
      
      // 一句话摘要
      document.getElementById('summaryText').textContent = data.summary;

      // 合同概览
      const overviewGrid = document.getElementById('overviewGrid');
      overviewGrid.innerHTML = '';
      if (data.overview) {
        const items = [
          { label: '合同类型', value: data.overview.contract_type },
          { label: '合同金额', value: data.overview.contract_value },
          { label: '甲方', value: data.overview.parties?.[0] },
          { label: '乙方', value: data.overview.parties?.[1] },
          { label: '合同期限', value: data.overview.duration },
          { label: '生效日期', value: data.overview.effective_date }
        ].filter(item => item.value);
        
        items.forEach(item => {
          overviewGrid.innerHTML += `
            <div class="overview-item">
              <div class="label">${item.label}</div>
              <div class="value">${item.value}</div>
            </div>
          `;
        });
      }

      // 关键条款
      const clausesList = document.getElementById('clausesList');
      clausesList.innerHTML = '';
      if (data.key_clauses && data.key_clauses.length > 0) {
        data.key_clauses.forEach(clause => {
          clausesList.innerHTML += `
            <div class="clause-item ${clause.importance || 'medium'}">
              <div class="clause-type">${clause.type}</div>
              <div class="clause-content">${clause.content}</div>
            </div>
          `;
        });
      }

      // 风险提示
      const risksList = document.getElementById('risksList');
      risksList.innerHTML = '';
      if (data.risks && data.risks.length > 0) {
        data.risks.forEach(risk => {
          risksList.innerHTML += `
            <div class="risk-item ${risk.level || 'medium'}">
              <span class="risk-badge ${risk.level || 'medium'}">${risk.level === 'high' ? '高' : risk.level === 'medium' ? '中' : '低'}风险</span>
              <div class="risk-content">
                <div class="risk-desc">${risk.description}</div>
                <div class="risk-suggestion">💡 ${risk.suggestion}</div>
              </div>
            </div>
          `;
        });
      } else {
        risksList.innerHTML = '<p style="color: #27ae60; padding: 16px;">✅ 未发现明显风险点</p>';
      }

      // 亮点
      const highlightsList = document.getElementById('highlightsList');
      highlightsList.innerHTML = '';
      if (data.highlights && data.highlights.length > 0) {
        data.highlights.forEach(h => {
          highlightsList.innerHTML += `<span class="highlight-tag">${h}</span>`;
        });
      }
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('show', show);
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('show');
    }
  </script>
</body>
</html>
