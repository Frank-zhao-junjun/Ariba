<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>需求分析报告 - Ariba实施助手</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .header {
      background: white;
      border-radius: 15px;
      padding: 20px 30px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .header h1 { color: #2c3e50; font-size: 1.5em; }
    .header-actions { display: flex; gap: 10px; }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.3s;
    }
    .btn-primary { background: #3498db; color: white; }
    .btn-primary:hover { background: #2980b9; }
    .btn-secondary { background: #95a5a6; color: white; }
    .btn-secondary:hover { background: #7f8c8d; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #229954; }
    
    .back-link {
      color: white;
      text-decoration: none;
      padding: 8px 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
    }
    .back-link:hover { background: rgba(255,255,255,0.3); }
    
    .main-content {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
    }
    
    .report-content {
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ecf0f1;
    }
    
    .card-header h3 {
      color: #2c3e50;
      font-size: 1.1em;
    }
    
    /* 执行摘要 */
    .executive-summary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 30px;
    }
    
    .executive-summary h2 {
      margin-bottom: 20px;
      font-size: 1.3em;
    }
    
    .key-metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 25px;
    }
    
    .metric-card {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    
    .metric-value {
      font-size: 2.2em;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .metric-label {
      font-size: 0.9em;
      opacity: 0.9;
    }
    
    .key-findings {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 20px;
    }
    
    .key-findings h3 { margin-bottom: 15px; }
    .key-findings li { margin-left: 20px; margin-bottom: 8px; }
    
    /* 模块导航 */
    .module-nav {
      position: sticky;
      top: 20px;
    }
    
    .module-nav ul {
      list-style: none;
    }
    
    .module-nav li {
      margin-bottom: 8px;
    }
    
    .module-nav a {
      display: block;
      padding: 10px 15px;
      color: #2c3e50;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.3s;
      font-size: 0.9em;
    }
    
    .module-nav a:hover, .module-nav a.active {
      background: #667eea;
      color: white;
    }
    
    /* 报告模块 */
    .report-module {
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid #ecf0f1;
    }
    
    .report-module:last-child { border-bottom: none; }
    
    .module-title {
      color: #2c3e50;
      font-size: 1.3em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .module-number {
      background: #667eea;
      color: white;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9em;
    }
    
    /* 表格样式 */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
    }
    
    .data-table th, .data-table td {
      border: 1px solid #ecf0f1;
      padding: 12px 15px;
      text-align: left;
    }
    
    .data-table th {
      background: #f8f9fa;
      color: #2c3e50;
      font-weight: 600;
    }
    
    .data-table tr:hover { background: #f8f9fa; }
    
    /* 标签样式 */
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 15px;
      font-size: 0.85em;
      font-weight: 500;
    }
    
    .tag-success { background: #d4edda; color: #155724; }
    .tag-warning { background: #fff3cd; color: #856404; }
    .tag-danger { background: #f8d7da; color: #721c24; }
    .tag-info { background: #d1ecf1; color: #0c5460; }
    .tag-purple { background: #e2d9f3; color: #5a4d8a; }
    
    /* 图表容器 */
    .chart-container {
      width: 100%;
      height: 300px;
      margin: 20px 0;
    }
    
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    
    /* 风险指示器 */
    .risk-indicator {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    
    .risk-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    
    .risk-high .risk-dot { background: #e74c3c; }
    .risk-medium .risk-dot { background: #f39c12; }
    .risk-low .risk-dot { background: #27ae60; }
    
    /* 时间线 */
    .timeline {
      position: relative;
      padding-left: 30px;
    }
    
    .timeline::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #3498db;
    }
    
    .timeline-item {
      position: relative;
      margin-bottom: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -25px;
      top: 18px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #3498db;
      border: 3px solid white;
    }
    
    .timeline-date {
      font-size: 0.85em;
      color: #7f8c8d;
      margin-bottom: 5px;
    }
    
    .timeline-title {
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 5px;
    }
    
    /* 推荐卡片 */
    .recommendation-card {
      background: linear-gradient(135deg, #667eea20, #764ba220);
      border-left: 4px solid #667eea;
      padding: 15px 20px;
      margin: 15px 0;
      border-radius: 0 8px 8px 0;
    }
    
    .recommendation-card.priority-high {
      border-left-color: #e74c3c;
      background: linear-gradient(135deg, #e74c3c20, #e74c3c10);
    }
    
    .recommendation-card h4 {
      color: #2c3e50;
      margin-bottom: 8px;
    }
    
    .recommendation-card p {
      color: #555;
      font-size: 0.95em;
    }
    
    /* 评分进度条 */
    .score-bar {
      height: 20px;
      background: #ecf0f1;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    
    .score-bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease;
    }
    
    .score-bar-fill.high { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .score-bar-fill.medium { background: linear-gradient(90deg, #f39c12, #f1c40f); }
    .score-bar-fill.low { background: linear-gradient(90deg, #e74c3c, #c0392b); }
    
    .score-bar-text {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8em;
      font-weight: 600;
      color: #2c3e50;
    }
    
    /* 加载状态 */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ecf0f1;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* 导出按钮组 */
    .export-group {
      display: flex;
      gap: 10px;
    }
    
    /* 响应式 */
    @media (max-width: 1024px) {
      .main-content {
        grid-template-columns: 1fr;
      }
      .key-metrics {
        grid-template-columns: repeat(2, 1fr);
      }
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }
    
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }
      .key-metrics {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Ariba需求分析报告</h1>
    <div class="header-actions">
      <a href="/requirement-interview.html" class="back-link">← 返回访谈</a>
      <div class="export-group">
        <button class="btn btn-primary" onclick="exportReport('html')">📥 导出HTML</button>
        <button class="btn btn-success" onclick="exportReport('pdf')">📄 导出PDF</button>
      </div>
    </div>
  </div>
  
  <div class="main-content">
    <div class="report-content" id="reportContent">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>
    
    <div class="sidebar">
      <!-- 快速导航 -->
      <div class="card module-nav">
        <div class="card-header">
          <h3>📑 报告目录</h3>
        </div>
        <ul id="moduleNav"></ul>
      </div>
      
      <!-- 关键指标 -->
      <div class="card">
        <div class="card-header">
          <h3>📈 关键指标</h3>
        </div>
        <div id="keyMetrics"></div>
      </div>
      
      <!-- 图表区域 -->
      <div class="card">
        <div class="card-header">
          <h3>📊 可视化分析</h3>
        </div>
        <div class="chart-container" id="capabilityChart"></div>
      </div>
      
      <div class="card">
        <div class="chart-container" id="gapChart"></div>
      </div>
    </div>
  </div>
  
  <script>
    // 全局变量
    let currentReport = null;
    let capabilityChart = null;
    let gapChart = null;
    
    // 报告模块定义
    const modules = [
      { id: 'executive-summary', title: '执行摘要', icon: '📋' },
      { id: 'enterprise-profile', title: '企业需求画像', icon: '🏢' },
      { id: 'capability-match', title: 'Ariba能力匹配度', icon: '✅' },
      { id: 'gap-analysis', title: 'Gap分析', icon: '🔍' },
      { id: 'roi-analysis', title: 'ROI分析', icon: '💰' },
      { id: 'change-management', title: '组织变革管理', icon: '🔄' },
      { id: 'data-migration', title: '数据迁移策略', icon: '📦' },
      { id: 'technical-architecture', title: '技术架构分析', icon: '⚙️' },
      { id: 'compliance-analysis', title: '合规性分析', icon: '🛡️' },
      { id: 'competitor-analysis', title: '竞品对比分析', icon: '📊' },
      { id: 'risk-assessment', title: '风险评估与应对', icon: '⚠️' },
      { id: 'project-governance', title: '项目治理', icon: '👥' },
      { id: 'pilot-plan', title: '试点方案', icon: '🚀' },
      { id: 'success-cases', title: '成功案例参考', icon: '🌟' },
      { id: 'implementation-roadmap', title: '实施建议', icon: '🗺️' }
    ];
    
    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      // 获取报告ID
      const urlParams = new URLSearchParams(window.location.search);
      const reportId = urlParams.get('id');
      
      if (reportId) {
        await loadReport(reportId);
      } else {
        // 使用示例数据
        loadSampleReport();
      }
      
      // 初始化导航
      initModuleNav();
    });
    
    // 加载报告
    async function loadReport(reportId) {
      try {
        const response = await fetch(`/api/report/${reportId}`);
        const result = await response.json();
        
        if (result.success) {
          currentReport = result.report;
          renderReport(currentReport);
          initCharts(currentReport);
        } else {
          showError(result.error);
        }
      } catch (error) {
        console.error('加载报告失败:', error);
        loadSampleReport();
      }
    }
    
    // 加载示例报告
    function loadSampleReport() {
      currentReport = generateSampleReport();
      renderReport(currentReport);
      initCharts(currentReport);
    }
    
    // 生成示例报告数据
    function generateSampleReport() {
      return {
        id: 'RPT-SAMPLE-001',
        timestamp: new Date().toISOString(),
        executiveSummary: {
          title: 'SAP Ariba需求分析报告 - 执行摘要',
          keyFindings: [
            'Ariba与贵司需求高度匹配，实施风险较低',
            '预计年节约采购成本85万元，三年ROI达180%',
            '项目风险可控，建议加强变更管理和用户培训'
          ],
          coreRecommendations: [
            '建议采用分阶段实施策略',
            '优先实施核心模块，快速交付价值',
            '充分重视数据治理和主数据质量'
          ],
          expectedOutcomes: [
            '采购效率提升35%',
            '审批周期缩短50%以上',
            '支出可视性达到90%'
          ],
          goDecision: '建议推进'
        },
        enterpriseProfile: {
          basicInfo: {
            industry: '制造业',
            companySize: '中型企业',
            employeeCount: '500-1000人',
            annualSpend: '5000万-1亿',
            supplierCount: '200-300家'
          },
          currentState: {
            erpSystem: 'SAP ECC',
            processMaturity: 3
          },
          painPoints: [
            { description: '审批流程繁琐，平均审批周期3-5天' },
            { description: '支出不透明，难以进行有效的成本控制' },
            { description: '供应商绩效缺乏量化评估' }
          ],
          requirements: [
            { title: '采购申请审批流', priority: 'high', category: 'buying' },
            { title: '供应商绩效评估', priority: 'high', category: 'supplier_management' },
            { title: '合同全生命周期管理', priority: 'medium', category: 'contract' }
          ]
        },
        capabilityMatch: {
          overallScore: {
            overallMatchRate: 85,
            coverageRate: 88,
            fitRate: 82,
            integrationRate: 90,
            recommendation: '高度推荐'
          },
          moduleScores: {
            buying: { moduleName: '采购管理', coverage: 90, fit: 85, integration: 92, total: 89 },
            sourcing: { moduleName: '寻源管理', coverage: 85, fit: 80, integration: 88, total: 84 },
            contract: { moduleName: '合同管理', coverage: 88, fit: 82, integration: 90, total: 87 },
            supplier_management: { moduleName: '供应商管理', coverage: 85, fit: 80, integration: 85, total: 83 }
          }
        },
        gapAnalysis: {
          gaps: [
            { id: 'GAP-001', priorityLevel: 'P1', description: '非标采购流程需要定制', module: 'buying', risk: 'medium' },
            { id: 'GAP-002', priorityLevel: 'P2', description: '与现有预算系统集成', module: 'buying', risk: 'low' },
            { id: 'GAP-003', priorityLevel: 'P2', description: '移动端审批体验优化', module: 'buying', risk: 'low' }
          ],
          summary: { totalGaps: 3, critical: 0, high: 1, medium: 2, low: 0 }
        },
        roiAnalysis: {
          investmentAnalysis: {
            totalInvestment: 8000000,
            breakdown: { software: 2000000, implementation: 3200000, training: 800000, integration: 1200000, dataMigration: 800000 }
          },
          savingsAnalysis: {
            totalAnnualSavings: 850000,
            savingsRate: 8.5
          },
          roiMetrics: { threeYearROI: 180, paybackPeriodMonths: 14 }
        },
        riskAssessment: {
          overallRiskProfile: { level: 'medium', score: 45, summary: '项目风险可控，需要持续监控' },
          projectRisks: [
            { id: 'PRJ-001', title: '范围蔓延', likelihood: 'medium', impact: 'high', riskScore: 6 },
            { id: 'PRJ-002', title: '资源不足', likelihood: 'medium', impact: 'high', riskScore: 6 }
          ]
        },
        implementationRoadmap: {
          roadmap: {
            phases: [
              { phase: 1, name: '基础建设期', duration: '3个月', milestones: [{ name: '项目Kickoff' }, { name: '方案设计完成' }] },
              { phase: 2, name: '试点实施期', duration: '3个月', milestones: [{ name: 'UAT开始' }, { name: '试点上线' }] },
              { phase: 3, name: '全面推广期', duration: '4个月', milestones: [{ name: '分批上线' }, { name: '优化完善' }] }
            ],
            totalDuration: '10个月'
          },
          recommendations: [
            { category: '战略', priority: 'P1', title: '明确采购数字化战略目标', description: '将Ariba实施与公司采购数字化战略对齐' },
            { category: '技术', priority: 'P2', title: '重视数据治理', description: '提前启动数据清理和标准化工作' },
            { category: '变革', priority: 'P1', title: '加强变革管理', description: '制定全面的沟通和培训计划' }
          ]
        }
      };
    }
    
    // 渲染报告
    function renderReport(report) {
      const content = document.getElementById('reportContent');
      
      content.innerHTML = `
        <!-- 执行摘要 -->
        <section id="executive-summary" class="report-module">
          <div class="executive-summary">
            <h2>📋 ${report.executiveSummary?.title || '执行摘要'}</h2>
            
            <div class="key-metrics">
              <div class="metric-card">
                <div class="metric-value">${report.capabilityMatch?.overallScore?.overallMatchRate || 0}%</div>
                <div class="metric-label">Ariba匹配度</div>
              </div>
              <div class="metric-card">
                <div class="metric-value">${report.roiAnalysis?.roiMetrics?.threeYearROI || 0}%</div>
                <div class="metric-label">3年ROI</div>
              </div>
              <div class="metric-card">
                <div class="metric-value">${report.roiAnalysis?.roiMetrics?.paybackPeriodMonths || 0}月</div>
                <div class="metric-label">投资回收期</div>
              </div>
              <div class="metric-card">
                <div class="metric-value">${report.gapAnalysis?.summary?.totalGaps || 0}</div>
                <div class="metric-label">Gap数量</div>
              </div>
            </div>
            
            <div class="key-findings">
              <h3>🔑 关键发现</h3>
              <ul>
                ${(report.executiveSummary?.keyFindings || []).map(f => `<li>${f}</li>`).join('')}
              </ul>
            </div>
          </div>
          
          <div class="recommendation-card">
            <h4>💡 核心建议</h4>
            <ul style="margin-left: 20px; margin-top: 10px;">
              ${(report.executiveSummary?.coreRecommendations || []).map(r => `<li style="margin-bottom: 5px;">${r}</li>`).join('')}
            </ul>
          </div>
          
          <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 15px;">
            <strong>🎯 决策建议：</strong>
            <span class="tag tag-success">${report.executiveSummary?.goDecision || '建议推进'}</span>
          </div>
        </section>
        
        <!-- 企业需求画像 -->
        <section id="enterprise-profile" class="report-module">
          <div class="module-title">
            <span class="module-number">2</span>
            <span>🏢 企业需求画像</span>
          </div>
          
          <table class="data-table">
            <tr><th>项目</th><th>信息</th></tr>
            <tr><td>行业</td><td>${report.enterpriseProfile?.basicInfo?.industry || '-'}</td></tr>
            <tr><td>企业规模</td><td>${report.enterpriseProfile?.basicInfo?.companySize || '-'}</td></tr>
            <tr><td>员工数量</td><td>${report.enterpriseProfile?.basicInfo?.employeeCount || '-'}</td></tr>
            <tr><td>年采购额</td><td>${report.enterpriseProfile?.basicInfo?.annualSpend || '-'}</td></tr>
            <tr><td>供应商数量</td><td>${report.enterpriseProfile?.basicInfo?.supplierCount || '-'}</td></tr>
            <tr><td>现有ERP系统</td><td>${report.enterpriseProfile?.currentState?.erpSystem || '-'}</td></tr>
          </table>
          
          <h4 style="margin: 20px 0 10px;">🔴 核心痛点</h4>
          <div style="display: grid; gap: 10px;">
            ${(report.enterpriseProfile?.painPoints || []).map(p => `
              <div class="recommendation-card">
                <p>${p.description || p}</p>
              </div>
            `).join('')}
          </div>
        </section>
        
        <!-- Ariba能力匹配度 -->
        <section id="capability-match" class="report-module">
          <div class="module-title">
            <span class="module-number">3</span>
            <span>✅ Ariba能力匹配度</span>
          </div>
          
          <div style="margin-bottom: 20px;">
            <span class="tag tag-success">整体匹配度: ${report.capabilityMatch?.overallScore?.overallMatchRate || 0}%</span>
            <span class="tag tag-info">推荐: ${report.capabilityMatch?.overallScore?.recommendation || '-'}</span>
          </div>
          
          <table class="data-table">
            <tr>
              <th>模块</th>
              <th>功能覆盖</th>
              <th>流程匹配</th>
              <th>集成可行性</th>
              <th>综合评分</th>
            </tr>
            ${Object.entries(report.capabilityMatch?.moduleScores || {}).map(([id, score]) => `
              <tr>
                <td>${score.moduleName || id}</td>
                <td>
                  <div class="score-bar">
                    <div class="score-bar-fill ${score.coverage >= 80 ? 'high' : score.coverage >= 60 ? 'medium' : 'low'}" style="width: ${score.coverage || 0}%"></div>
                    <span class="score-bar-text">${score.coverage || 0}%</span>
                  </div>
                </td>
                <td>
                  <div class="score-bar">
                    <div class="score-bar-fill ${score.fit >= 80 ? 'high' : score.fit >= 60 ? 'medium' : 'low'}" style="width: ${score.fit || 0}%"></div>
                    <span class="score-bar-text">${score.fit || 0}%</span>
                  </div>
                </td>
                <td>
                  <div class="score-bar">
                    <div class="score-bar-fill ${score.integration >= 80 ? 'high' : score.integration >= 60 ? 'medium' : 'low'}" style="width: ${score.integration || 0}%"></div>
                    <span class="score-bar-text">${score.integration || 0}%</span>
                  </div>
                </td>
                <td><strong>${score.total || 0}%</strong></td>
              </tr>
            `).join('')}
          </table>
        </section>
        
        <!-- Gap分析 -->
        <section id="gap-analysis" class="report-module">
          <div class="module-title">
            <span class="module-number">4</span>
            <span>🔍 Gap分析</span>
          </div>
          
          <p>共识别 <strong>${report.gapAnalysis?.summary?.totalGaps || 0}</strong> 个差距项：
            <span class="tag tag-danger">${report.gapAnalysis?.summary?.critical || 0} 严重</span>
            <span class="tag tag-warning">${report.gapAnalysis?.summary?.high || 0} 高</span>
            <span class="tag tag-info">${report.gapAnalysis?.summary?.medium || 0} 中</span>
            <span class="tag tag-success">${report.gapAnalysis?.summary?.low || 0} 低</span>
          </p>
          
          <table class="data-table">
            <tr><th>优先级</th><th>Gap描述</th><th>模块</th><th>风险等级</th></tr>
            ${(report.gapAnalysis?.gaps || []).map(gap => `
              <tr>
                <td><span class="tag ${gap.priorityLevel === 'P1' ? 'tag-danger' : gap.priorityLevel === 'P2' ? 'tag-warning' : 'tag-info'}">${gap.priorityLevel || '-'}</span></td>
                <td>${gap.description || '-'}</td>
                <td>${gap.module || '-'}</td>
                <td class="risk-indicator risk-${gap.risk || 'low'}"><span class="risk-dot"></span>${gap.risk || '-'}</td>
              </tr>
            `).join('')}
          </table>
        </section>
        
        <!-- ROI分析 -->
        <section id="roi-analysis" class="report-module">
          <div class="module-title">
            <span class="module-number">5</span>
            <span>💰 ROI分析</span>
          </div>
          
          <div class="charts-grid">
            <div>
              <h4>💵 投资分析</h4>
              <table class="data-table">
                <tr><td>总投资成本</td><td><strong>¥${formatCurrency(report.roiAnalysis?.investmentAnalysis?.totalInvestment || 0)}</strong></td></tr>
                <tr><td>软件许可</td><td>¥${formatCurrency(report.roiAnalysis?.investmentAnalysis?.breakdown?.software || 0)}</td></tr>
                <tr><td>实施服务</td><td>¥${formatCurrency(report.roiAnalysis?.investmentAnalysis?.breakdown?.implementation || 0)}</td></tr>
                <tr><td>培训费用</td><td>¥${formatCurrency(report.roiAnalysis?.investmentAnalysis?.breakdown?.training || 0)}</td></tr>
                <tr><td>集成开发</td><td>¥${formatCurrency(report.roiAnalysis?.investmentAnalysis?.breakdown?.integration || 0)}</td></tr>
                <tr><td>数据迁移</td><td>¥${formatCurrency(report.roiAnalysis?.investmentAnalysis?.breakdown?.dataMigration || 0)}</td></tr>
              </table>
            </div>
            <div>
              <h4>📈 收益分析</h4>
              <table class="data-table">
                <tr><td>年节约金额</td><td><strong>¥${formatCurrency(report.roiAnalysis?.savingsAnalysis?.totalAnnualSavings || 0)}</strong></td></tr>
                <tr><td>节约率</td><td>${report.roiAnalysis?.savingsAnalysis?.savingsRate || 0}%</td></tr>
                <tr><td>3年ROI</td><td><strong class="tag tag-success">${report.roiAnalysis?.roiMetrics?.threeYearROI || 0}%</strong></td></tr>
                <tr><td>投资回收期</td><td><strong>${report.roiAnalysis?.roiMetrics?.paybackPeriodMonths || 0}个月</strong></td></tr>
              </table>
            </div>
          </div>
        </section>
        
        <!-- 实施建议 -->
        <section id="implementation-roadmap" class="report-module">
          <div class="module-title">
            <span class="module-number">15</span>
            <span>🗺️ 实施建议</span>
          </div>
          
          <h4>📋 关键建议</h4>
          ${(report.implementationRoadmap?.recommendations || []).map(rec => `
            <div class="recommendation-card ${rec.priority === 'P1' ? 'priority-high' : ''}">
              <h4>[${rec.category} - ${rec.priority}] ${rec.title}</h4>
              <p>${rec.description}</p>
            </div>
          `).join('')}
          
          <h4 style="margin-top: 30px;">📅 实施路线图</h4>
          <div class="timeline">
            ${(report.implementationRoadmap?.roadmap?.phases || []).map(p => `
              <div class="timeline-item">
                <div class="timeline-date">Phase ${p.phase} | ${p.duration}</div>
                <div class="timeline-title">${p.name}</div>
                <div style="margin-top: 8px;">
                  ${(p.milestones || []).map(m => `<span class="tag tag-info" style="margin-right: 5px;">${m.name}</span>`).join('')}
                </div>
              </div>
            `).join('')}
          </div>
          
          <div style="background: #e8f6f3; padding: 15px; border-radius: 8px; margin-top: 20px;">
            <strong>⏱️ 预计总工期：</strong> ${report.implementationRoadmap?.roadmap?.totalDuration || '-'}
          </div>
        </section>
      `;
      
      // 渲染侧边栏指标
      renderKeyMetrics(report);
    }
    
    // 渲染关键指标
    function renderKeyMetrics(report) {
      const container = document.getElementById('keyMetrics');
      
      container.innerHTML = `
        <div style="margin-bottom: 15px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span>Ariba匹配度</span>
            <span>${report.capabilityMatch?.overallScore?.overallMatchRate || 0}%</span>
          </div>
          <div class="score-bar">
            <div class="score-bar-fill high" style="width: ${report.capabilityMatch?.overallScore?.overallMatchRate || 0}%"></div>
          </div>
        </div>
        
        <div style="margin-bottom: 15px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span>3年ROI</span>
            <span>${report.roiAnalysis?.roiMetrics?.threeYearROI || 0}%</span>
          </div>
          <div class="score-bar">
            <div class="score-bar-fill high" style="width: ${Math.min(100, (report.roiAnalysis?.roiMetrics?.threeYearROI || 0) / 3)}%"></div>
          </div>
        </div>
        
        <div style="margin-bottom: 15px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span>项目风险</span>
            <span class="tag ${report.riskAssessment?.overallRiskProfile?.level === 'high' ? 'tag-danger' : report.riskAssessment?.overallRiskProfile?.level === 'medium' ? 'tag-warning' : 'tag-success'}">
              ${report.riskAssessment?.overallRiskProfile?.level || 'unknown'}
            </span>
          </div>
        </div>
        
        <div style="margin-bottom: 15px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span>总工期</span>
            <span>${report.implementationRoadmap?.roadmap?.totalDuration || '-'}</span>
          </div>
        </div>
        
        <div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span>Gap数量</span>
            <span>${report.gapAnalysis?.summary?.totalGaps || 0}</span>
          </div>
          <div style="display: flex; gap: 5px; flex-wrap: wrap;">
            <span class="tag tag-danger" style="font-size: 0.75em;">${report.gapAnalysis?.summary?.critical || 0}</span>
            <span class="tag tag-warning" style="font-size: 0.75em;">${report.gapAnalysis?.summary?.high || 0}</span>
            <span class="tag tag-info" style="font-size: 0.75em;">${report.gapAnalysis?.summary?.medium || 0}</span>
            <span class="tag tag-success" style="font-size: 0.75em;">${report.gapAnalysis?.summary?.low || 0}</span>
          </div>
        </div>
      `;
    }
    
    // 初始化模块导航
    function initModuleNav() {
      const nav = document.getElementById('moduleNav');
      nav.innerHTML = modules.map(m => `
        <li><a href="#${m.id}" onclick="scrollToModule('${m.id}')">${m.icon} ${m.title}</a></li>
      `).join('');
    }
    
    // 滚动到模块
    function scrollToModule(id) {
      const element = document.getElementById(id);
      if (element) {
        element.scrollIntoView({ behavior: 'smooth' });
        document.querySelectorAll('.module-nav a').forEach(a => a.classList.remove('active'));
        document.querySelector(`.module-nav a[href="#${id}"]`)?.classList.add('active');
      }
    }
    
    // 初始化图表
    function initCharts(report) {
      // 能力匹配度雷达图
      const capabilityEl = document.getElementById('capabilityChart');
      if (capabilityEl) {
        capabilityChart = echarts.init(capabilityEl);
        const capabilityData = generateCapabilityChartData(report);
        capabilityChart.setOption({
          title: { text: '模块能力匹配', left: 'center', textStyle: { fontSize: 14 } },
          tooltip: {},
          radar: {
            indicator: capabilityData.indicators,
            radius: '65%'
          },
          series: [{
            type: 'radar',
            data: [{
              value: capabilityData.values,
              name: '匹配度',
              areaStyle: { color: 'rgba(102, 126, 234, 0.3)' },
              lineStyle: { color: '#667eea' }
            }]
          }]
        });
      }
      
      // Gap分布饼图
      const gapEl = document.getElementById('gapChart');
      if (gapEl) {
        gapChart = echarts.init(gapEl);
        const gapSummary = report.gapAnalysis?.summary || { critical: 0, high: 0, medium: 0, low: 0 };
        gapChart.setOption({
          title: { text: 'Gap分布', left: 'center', textStyle: { fontSize: 14 } },
          tooltip: { trigger: 'item' },
          series: [{
            type: 'pie',
            radius: ['40%', '70%'],
            data: [
              { value: gapSummary.critical || 0, name: '严重', itemStyle: { color: '#e74c3c' } },
              { value: gapSummary.high || 0, name: '高', itemStyle: { color: '#f39c12' } },
              { value: gapSummary.medium || 0, name: '中', itemStyle: { color: '#3498db' } },
              { value: gapSummary.low || 0, name: '低', itemStyle: { color: '#95a5a6' } }
            ]
          }]
        });
      }
    }
    
    // 生成能力图表数据
    function generateCapabilityChartData(report) {
      const scores = report.capabilityMatch?.moduleScores || {};
      const indicators = Object.values(scores).map(s => ({
        name: s.moduleName || 'Unknown',
        max: 100
      }));
      const values = Object.values(scores).map(s => s.total || 0);
      
      return { indicators, values };
    }
    
    // 格式化货币
    function formatCurrency(value) {
      if (value >= 100000000) {
        return (value / 100000000).toFixed(1) + '亿';
      } else if (value >= 10000) {
        return (value / 10000).toFixed(0) + '万';
      }
      return value.toLocaleString();
    }
    
    // 导出报告
    async function exportReport(format) {
      if (format === 'html') {
        window.open(`/api/report/${currentReport?.id}/export/html`, '_blank');
      } else if (format === 'pdf') {
        alert('PDF导出功能需要服务器支持，请使用HTML导出后浏览器打印为PDF');
      }
    }
    
    // 显示错误
    function showError(message) {
      document.getElementById('reportContent').innerHTML = `
        <div style="text-align: center; padding: 50px;">
          <h2 style="color: #e74c3c;">加载失败</h2>
          <p>${message}</p>
          <button class="btn btn-primary" onclick="loadSampleReport()">加载示例报告</button>
        </div>
      `;
    }
    
    // 窗口调整时重绘图表
    window.addEventListener('resize', () => {
      capabilityChart?.resize();
      gapChart?.resize();
    });
  </script>
</body>
</html>
