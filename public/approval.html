<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>智能审批助手 - Ariba项目实施助手</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}.container{max-width:1400px;margin:0 auto}.header{background:white;border-radius:16px;padding:24px 32px;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}.header h1{color:#1a1a2e;font-size:28px;margin-bottom:8px}.header p{color:#666;font-size:14px}.nav-tabs{display:flex;gap:8px;margin-bottom:24px;background:white;padding:8px;border-radius:12px}.nav-tab{padding:12px 24px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#666}.nav-tab.active{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}.content{background:white;border-radius:16px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:32px}.stat-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:24px;border-radius:12px;text-align:center}.stat-card.warning{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%)}.stat-card.success{background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)}.stat-number{font-size:36px;font-weight:700}.stat-label{font-size:14px;opacity:0.9;margin-top:8px}.filter-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}.filter-bar select,.filter-bar input,.filter-bar button{padding:10px 16px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px}.filter-bar button{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;cursor:pointer}table{width:100%;border-collapse:collapse}th,td{padding:16px;text-align:left;border-bottom:1px solid #e0e0e0}th{background:#f8f9fa;font-weight:600;color:#333}tr:hover{background:#f8f9fa}.priority-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}.priority-high{background:#fee;color:#c00}.priority-medium{background:#ffeaa7;color:#d63031}.priority-low{background:#d5f5e3;color:#00b894}.amount{font-weight:600;color:#1a1a2e}.btn{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;margin-right:4px}.btn-approve{background:#00b894;color:white}.btn-reject{background:#d63031;color:white}.btn-detail{background:#667eea;color:white}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center}.modal.active{display:flex}.modal-content{background:white;border-radius:16px;padding:32px;max-width:800px;width:90%;max-height:90vh;overflow-y:auto}.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #e0e0e0}.modal-close{width:32px;height:32px;border:none;background:#f0f0f0;border-radius:50%;cursor:pointer;font-size:18px}.detail-section{margin-bottom:24px}.detail-section h3{font-size:16px;color:#1a1a2e;margin-bottom:12px}.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.detail-item{padding:12px;background:#f8f9fa;border-radius:8px}.detail-item label{font-size:12px;color:#888;display:block;margin-bottom:4px}.detail-item span{font-size:14px;color:#333;font-weight:500}.suggestion-box{background:linear-gradient(135deg,#667eea20 0%,#764ba220 100%);border:1px solid #667eea40;border-radius:12px;padding:20px}.suggestion-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:600;background:#00b894;color:white;margin-right:12px}.suggestion-badge.review{background:#fdcb6e;color:#333}.risk-badge{padding:4px 12px;border-radius:20px;font-size:12px;background:#d5f5e3;color:#00b894}.risk-badge.medium{background:#ffeaa7;color:#d63031}.risk-badge.high{background:#fee;color:#c00}.reason-list,.warning-list{list-style:none;margin-top:12px}.reason-list li,.warning-list li{padding:8px 0;padding-left:24px;position:relative;font-size:14px;color:#555}.reason-list li::before{content:'✓';position:absolute;left:0;color:#00b894}.warning-list li::before{content:'⚠';position:absolute;left:0;color:#fdcb6e}.comment-input{width:100%;padding:12px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;resize:vertical;min-height:80px;margin-top:12px}.modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}.modal-actions button{padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500}.btn-cancel{background:#e0e0e0;color:#333}.btn-confirm{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}.batch-actions{display:none;gap:12px;margin-bottom:16px;padding:16px;background:#f8f9fa;border-radius:8px;align-items:center}.batch-actions.visible{display:flex}.batch-actions button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}.nl-query-section{background:#f8f9fa;border-radius:12px;padding:24px;margin-bottom:24px}.nl-query-section h3{font-size:16px;color:#1a1a2e;margin-bottom:16px}.nl-input-group{display:flex;gap:12px}.nl-input-group input{flex:1;padding:14px 20px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none}.nl-input-group button{padding:14px 24px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500}.nl-response{margin-top:16px;padding:16px;background:white;border-radius:8px;border-left:4px solid #667eea;display:none}.nl-response p{font-size:14px;color:#555;line-height:1.6}.back-link{display:inline-flex;align-items:center;gap:8px;color:#667eea;text-decoration:none;font-size:14px;margin-bottom:16px}.loading{text-align:center;padding:40px;color:#666}.empty-state{text-align:center;padding:60px 20px;color:#888}</style>
</head>
<body>
<div class="container"><a href="/" class="back-link">← 返回首页</a>
<div class="header"><h1>📋 智能审批助手 v1.4</h1><p>对话式智能审批 · AI风险评估 · 批量高效处理</p></div>
<div class="nav-tabs"><button class="nav-tab active" data-tab="pending">待审批</button><button class="nav-tab" data-tab="history">审批历史</button></div>
<div class="content">
<div class="stats-grid"><div class="stat-card"><div class="stat-number" id="totalPending">0</div><div class="stat-label">待审批总数</div></div><div class="stat-card warning"><div class="stat-number" id="highPriority">0</div><div class="stat-label">高优先级</div></div><div class="stat-card success"><div class="stat-number" id="totalAmount">¥0</div><div class="stat-label">待审批金额</div></div></div>
<div class="nl-query-section"><h3>🔍 智能查询</h3><div class="nl-input-group"><input type="text" id="nlQuery" placeholder="输入自然语言查询，如：查看IT部门的待审批"><button onclick="handleNLQuery()">查询</button></div><div class="nl-response" id="nlResponse"></div></div>
<div class="filter-bar"><select id="typeFilter"><option value="">全部类型</option><option value="采购申请">采购申请</option><option value="采购订单">采购订单</option></select><select id="priorityFilter"><option value="">全部优先级</option><option value="高">高优先级</option><option value="中">中优先级</option></select><button onclick="loadPendingApprovals()">应用筛选</button><button onclick="clearFilters()">清除筛选</button></div>
<div class="batch-actions" id="batchActions"><span>已选择 <strong id="selectedCount">0</strong> 项</span><button class="batch-approve" onclick="batchApprove()" style="background:#00b894;color:white;">批量批准</button><button class="batch-reject" onclick="batchReject()" style="background:#d63031;color:white;">批量拒绝</button><button onclick="clearSelection()">取消选择</button></div>
<div class="table-container"><table><thead><tr><th><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th><th>单据编号</th><th>类型</th><th>标题</th><th>申请人</th><th>部门</th><th>金额</th><th>优先级</th><th>提交日期</th><th>操作</th></tr></thead><tbody id="approvalsTable"><tr><td colspan="10" class="loading">加载中...</td></tr></tbody></table></div>
<div id="historySection" style="display:none;"><div class="table-container"><table><thead><tr><th>单据编号</th><th>类型</th><th>标题</th><th>申请人</th><th>金额</th><th>审批结果</th><th>审批人</th><th>审批日期</th><th>备注</th></tr></thead><tbody id="historyTable"><tr><td colspan="9" class="loading">加载中...</td></tr></tbody></table></div></div>
</div></div>
<div class="modal" id="detailModal"><div class="modal-content"><div class="modal-header"><h2 id="modalTitle">审批详情</h2><button class="modal-close" onclick="closeModal()">×</button></div><div class="detail-section"><h3>📄 基本信息</h3><div class="detail-grid" id="basicInfo"></div></div><div class="detail-section"><h3>🤖 AI审批建议</h3><div class="suggestion-box" id="suggestionBox"></div></div><div class="detail-section"><h3>💬 审批意见</h3><textarea class="comment-input" id="commentInput" placeholder="请输入审批意见（可选）"></textarea></div><div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">取消</button><button onclick="processApproval('reject')" style="background:#d63031;color:white;">拒绝</button><button class="btn-confirm" onclick="processApproval('approve')">批准</button></div></div></div>
<script>
let currentApprovalId=null,selectedIds=new Set(),pendingApprovals=[];
document.addEventListener('DOMContentLoaded',()=>{loadPendingApprovals();setupNavTabs()});
function setupNavTabs(){document.querySelectorAll('.nav-tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');const tabName=tab.dataset.tab;document.querySelector('.table-container').parentElement.style.display=tabName==='pending'?'block':'none';document.getElementById('historySection').style.display=tabName==='history'?'block':'none';if(tabName==='history')loadHistory()})})}
async function loadPendingApprovals(){const type=document.getElementById('typeFilter').value,priority=document.getElementById('priorityFilter').value;let url='/api/approval/pending?';if(type)url+='type='+type+'&';if(priority)url+='priority='+priority;try{const res=await fetch(url),data=await res.json();if(data.success){pendingApprovals=data.approvals;renderApprovalsTable(data.approvals);updateStats(data.summary)}}catch(err){document.getElementById('approvalsTable').innerHTML='<tr><td colspan="10">加载失败</td></tr>'}}
function renderApprovalsTable(approvals){const tbody=document.getElementById('approvalsTable');if(!approvals||!approvals.length){tbody.innerHTML='<tr><td colspan="10" class="empty-state">暂无待审批项</td></tr>';return}tbody.innerHTML=approvals.map(item=>`<tr><td><input type="checkbox" value="${item.id}" onchange="toggleSelection('${item.id}')" ${selectedIds.has(item.id)?'checked':''}></td><td>${item.id}</td><td>${item.type}</td><td>${item.title}</td><td>${item.requester}</td><td>${item.department}</td><td class="amount">¥${item.amount.toLocaleString()}</td><td><span class="priority-badge priority-${item.priority==='高'?'high':item.priority==='中'?'medium':'low'}">${item.priority}</span></td><td>${item.submitDate}</td><td><button class="btn btn-detail" onclick="showDetail('${item.id}')">详情</button><button class="btn btn-approve" onclick="quickApprove('${item.id}')">批准</button></td></tr>`).join('')}
function updateStats(summary){document.getElementById('totalPending').textContent=summary.total;document.getElementById('highPriority').textContent=summary.byPriority['高']||0;document.getElementById('totalAmount').textContent='¥'+(summary.totalAmount/10000).toFixed(0)+'万'}
async function showDetail(id){currentApprovalId=id;try{const res=await fetch('/api/approval/'+id),data=await res.json();if(data.success){const approval=data.approval,suggestion=data.suggestion;document.getElementById('modalTitle').textContent=approval.id+' - '+approval.title;document.getElementById('basicInfo').innerHTML=`<div class="detail-item"><label>单据编号</label><span>${approval.id}</span></div><div class="detail-item"><label>类型</label><span>${approval.type}</span></div><div class="detail-item"><label>申请人</label><span>${approval.requester}</span></div><div class="detail-item"><label>部门</label><span>${approval.department}</span></div><div class="detail-item"><label>金额</label><span class="amount">¥${approval.amount.toLocaleString()}</span></div><div class="detail-item"><label>供应商</label><span>${approval.supplier}</span></div>`;const riskClass=suggestion.riskLevel==='低'?'low':suggestion.riskLevel==='中'?'medium':'high';document.getElementById('suggestionBox').innerHTML=`<span class="suggestion-badge ${suggestion.suggestion==='建议通过'?'review':''}">${suggestion.suggestion}</span><span class="risk-badge ${riskClass}">风险: ${suggestion.riskLevel}</span>${suggestion.reasons.length?'<ul class="reason-list">'+suggestion.reasons.map(r=>'<li>'+r+'</li>').join(''):''}</ul>${suggestion.warnings.length?'<ul class="warning-list">'+suggestion.warnings.map(w=>'<li>'+w+'</li>').join(''):''}</ul>`;document.getElementById('detailModal').classList.add('active')}}catch(err){alert('加载详情失败')}}
function closeModal(){document.getElementById('detailModal').classList.remove('active');document.getElementById('commentInput').value='';currentApprovalId=null}
async function processApproval(action){if(!currentApprovalId)return;const comment=document.getElementById('commentInput').value;try{const res=await fetch('/api/approval/process',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:currentApprovalId,action,comment})}),data=await res.json();if(data.success){alert(data.message);closeModal();loadPendingApprovals()}else{alert('操作失败')}}catch(err){alert('操作失败')}}
async function quickApprove(id){if(confirm('确认快速批准此审批项？')){try{const res=await fetch('/api/approval/process',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,action:'approve',comment:'快速批准'})}),data=await res.json();if(data.success){alert(data.message);loadPendingApprovals()}}catch(err){alert('操作失败')}}}
async function loadHistory(){try{const res=await fetch('/api/approval/history/list'),data=await res.json();if(data.success){const tbody=document.getElementById('historyTable');if(!data.history||!data.history.length){tbody.innerHTML='<tr><td colspan="9" class="empty-state">暂无审批历史</td></tr>';return}tbody.innerHTML=data.history.map(item=>`<tr><td>${item.id}</td><td>${item.type}</td><td>${item.title}</td><td>${item.requester}</td><td class="amount">¥${item.amount.toLocaleString()}</td><td>${item.status}</td><td>${item.approvedBy}</td><td>${item.approvedDate}</td><td>${item.comment||'-'}</td></tr>`).join('')}}catch(err){document.getElementById('historyTable').innerHTML='<tr><td colspan="9">加载失败</td></tr>'}}
async function handleNLQuery(){const query=document.getElementById('nlQuery').value.trim();if(!query)return;const responseBox=document.getElementById('nlResponse');responseBox.style.display='block';responseBox.innerHTML='<p>正在分析查询...</p>';try{const res=await fetch('/api/approval/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query})}),data=await res.json();if(data.success){responseBox.innerHTML='<p><strong>🤖 智能回复：</strong></p><p>'+data.response+'</p>';if(data.data&&data.data.approvals){renderApprovalsTable(data.data.approvals);updateStats(data.data.summary)}}}catch(err){responseBox.innerHTML='<p>查询处理失败</p>'}}
function toggleSelection(id){selectedIds.has(id)?selectedIds.delete(id):selectedIds.add(id);updateBatchUI()}
function toggleSelectAll(){const checked=document.getElementById('selectAll').checked;document.querySelectorAll('#approvalsTable input[type="checkbox"]').forEach(cb=>{cb.checked=checked;checked?selectedIds.add(cb.value):selectedIds.delete(cb.value)});updateBatchUI()}
function updateBatchUI(){document.getElementById('batchActions').className=selectedIds.size>0?'batch-actions visible':'batch-actions';document.getElementById('selectedCount').textContent=selectedIds.size}
function clearSelection(){selectedIds.clear();document.querySelectorAll('#approvalsTable input[type="checkbox"]').forEach(cb=>cb.checked=false);document.getElementById('selectAll').checked=false;updateBatchUI()}
async function batchApprove(){if(!selectedIds.size)return;if(!confirm('确认批量批准 '+selectedIds.size+' 项？'))return;try{const res=await fetch('/api/approval/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:Array.from(selectedIds),action:'approve',comment:'批量批准'})}),data=await res.json();if(data.success){alert('成功批准 '+data.processed+' 项');clearSelection();loadPendingApprovals()}}catch(err){alert('批量操作失败')}}
async function batchReject(){if(!selectedIds.size)return;if(!confirm('确认批量拒绝 '+selectedIds.size+' 项？'))return;try{const res=await fetch('/api/approval/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:Array.from(selectedIds),action:'reject',comment:'批量拒绝'})}),data=await res.json();if(data.success){alert('成功拒绝 '+data.processed+' 项');clearSelection();loadPendingApprovals()}}catch(err){alert('批量操作失败')}}
function clearFilters(){document.getElementById('typeFilter').value='';document.getElementById('priorityFilter').value='';loadPendingApprovals()}
</script></body></html>
