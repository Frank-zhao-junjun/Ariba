<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>需求分析助手 - Ariba项目实施助手</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;min-height:100vh}
    .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
    .header h1{font-size:1.5em}
    .header a{color:white;text-decoration:none;padding:8px 20px;background:rgba(255,255,255,0.2);border-radius:20px;transition:all 0.3s}
    .header a:hover{background:rgba(255,255,255,0.3)}
    .main{max-width:1400px;margin:0 auto;padding:30px;display:grid;grid-template-columns:1fr 1fr;gap:30px}
    .panel{background:white;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.08);overflow:hidden}
    .panel-header{background:#f8f9fa;padding:20px;border-bottom:1px solid #eee}
    .panel-header h2{color:#333;font-size:1.2em}
    .panel-body{padding:25px}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;margin-bottom:8px;color:#333;font-weight:500}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 15px;border:2px solid #e0e0e0;border-radius:10px;font-size:1em;transition:border-color 0.3s}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#667eea}
    .form-group textarea{min-height:120px;resize:vertical}
    .btn{padding:12px 30px;border:none;border-radius:25px;font-size:1em;font-weight:600;cursor:pointer;transition:all 0.3s}
    .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(102,126,234,0.4)}
    .btn-secondary{background:#e0e0e0;color:#666}
    .btn-secondary:hover{background:#d0d0d0}
    .btn-group{display:flex;gap:15px;margin-top:25px}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px}
    .stat-card{text-align:center;padding:15px;background:#f8f9fa;border-radius:10px}
    .stat-card .value{font-size:1.8em;font-weight:bold;color:#667eea}
    .stat-card .label{font-size:0.85em;color:#666}
    .requirement-item{border-left:4px solid #667eea;padding:15px;background:white;border-radius:8px;margin-bottom:12px}
    .requirement-item h4{color:#333;margin-bottom:8px}
    .requirement-meta{display:flex;gap:15px;font-size:0.9em;color:#666;margin-bottom:10px}
    .priority-badge{padding:3px 10px;border-radius:15px;font-size:0.85em;font-weight:600;color:white}
    .priority-p0{background:#f44336}.priority-p1{background:#ff9800}.priority-p2{background:#2196f3}.priority-p3{background:#9e9e9e}
    .conflict-item{background:#ffebee;border-left-color:#f44336}
    .supplement-item{background:#e8f5e9;border-left-color:#4caf50}
    .full-width{grid-column:1/-1}
    .loading{text-align:center;padding:40px;color:#666}
    .spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 15px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:1024px){.main{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <div class="header">
    <h1>📋 需求分析助手</h1>
    <a href="/">← 返回首页</a>
  </div>
  <div class="main">
    <div class="panel">
      <div class="panel-header"><h2>📝 输入需求信息</h2></div>
      <div class="panel-body">
        <div class="form-group">
          <label>行业类型 *</label>
          <select id="industry" required>
            <option value="制造业">制造业</option><option value="零售业">零售业</option><option value="能源行业">能源行业</option>
            <option value="医疗健康">医疗健康</option><option value="金融服务">金融服务</option><option value="通用" selected>通用行业</option>
          </select>
        </div>
        <div class="form-group">
          <label>核心模块 *</label>
          <select id="module" required>
            <option value="采购管理" selected>采购管理</option><option value="供应商管理">供应商管理</option>
            <option value="合同管理">合同管理</option><option value="寻源管理">寻源管理</option>
          </select>
        </div>
        <div class="form-group">
          <label>需求描述 *</label>
          <textarea id="description" placeholder="请详细描述您的采购业务需求..." required></textarea>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="analyzeRequirement()">🔍 分析需求</button>
          <button class="btn btn-secondary" onclick="supplementRequirements()">✨ 智能补充</button>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><h2>📊 分析结果</h2></div>
      <div class="panel-body" id="resultPanel">
        <div style="text-align:center;padding:60px 20px;color:#999;">
          <div style="font-size:3em;margin-bottom:15px;">📋</div>
          <p>请在左侧输入需求信息，点击"分析需求"开始</p>
        </div>
      </div>
    </div>
    <div class="panel full-width">
      <div class="panel-header"><h2>⚠️ 冲突检测</h2></div>
      <div class="panel-body" id="conflictPanel">
        <p style="color:#999;text-align:center;">分析需求后会自动检测冲突</p>
      </div>
    </div>
  </div>
  <script>
    let currentResult=null;
    async function analyzeRequirement(){
      const industry=document.getElementById('industry').value;
      const module=document.getElementById('module').value;
      const description=document.getElementById('description').value;
      if(!description.trim()){alert('请输入需求描述');return;}
      showLoading('正在分析需求...');
      try{
        const response=await fetch('/api/requirement/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({industry,modules:module,description})});
        const result=await response.json();
        currentResult=result;
        if(result.success){renderResults(result);if(result.requirements&&result.requirements.length>1)detectConflicts(result.requirements);}
        else{showError('分析失败');}
      }catch(e){showError('请求失败');}
    }
    async function supplementRequirements(){
      const industry=document.getElementById('industry').value;
      const module=document.getElementById('module').value;
      const currentReqs=currentResult?.requirements||[];
      showLoading('正在补充需求...');
      try{
        const response=await fetch('/api/requirement/supplement',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({industry,modules:module,currentRequirements:currentReqs})});
        const result=await response.json();
        if(result.success)renderSupplements(result.supplements);
        else showError('补充失败');
      }catch(e){showError('请求失败');}
    }
    async function detectConflicts(requirements){
      try{
        const response=await fetch('/api/requirement/conflict-check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({requirements})});
        const result=await response.json();
        if(result.success)renderConflicts(result);
      }catch(e){}
    }
    function renderResults(result){
      const panel=document.getElementById('resultPanel');
      const stats={total:result.requirements?.length||0,p0:result.requirements?.filter(r=>r.priority==='P0').length||0,p1:result.requirements?.filter(r=>r.priority==='P1').length||0};
      let html='<div class="stats-grid"><div class="stat-card"><div class="value">'+stats.total+'</div><div class="label">需求总数</div></div><div class="stat-card"><div class="value">'+stats.p0+'</div><div class="label">P0优先级</div></div><div class="stat-card"><div class="value">'+stats.p1+'</div><div class="label">P1优先级</div></div></div>';
      if(result.requirements)result.requirements.forEach(req=>{html+='<div class="requirement-item"><h4>'+req.id+': '+(req.name||'需求')+'</h4><div class="requirement-meta"><span class="priority-badge priority-'+(req.priority||'P2').toLowerCase()+'">'+req.priority+'</span><span>价值:'+(req.businessValue||5)+'/10</span><span>复杂度:'+(req.complexity||5)+'/10</span></div><p>'+(req.description||'')+'</p></div>';});
      panel.innerHTML=html;
    }
    function renderSupplements(supplements){
      const panel=document.getElementById('conflictPanel');
      if(!supplements||!supplements.length){panel.innerHTML='<p style="color:#999;text-align:center;">没有找到补充需求</p>';return;}
      let html='';
      supplements.forEach(req=>{html+='<div class="requirement-item supplement-item"><h4>'+req.id+': '+(req.name||'建议需求')+'</h4><div class="requirement-meta"><span class="priority-badge priority-'+(req.priority||'P2').toLowerCase()+'">'+req.priority+'</span></div><p>'+(req.description||'')+'</p><p style="color:#4caf50;font-size:0.9em;margin-top:8px;">💡 '+(req.reason||'AI智能推荐')+'</p></div>';});
      panel.innerHTML=html;
    }
    function renderConflicts(result){
      const panel=document.getElementById('conflictPanel');
      if(!result.conflicts||!result.conflicts.length){panel.innerHTML='<div class="requirement-item" style="border-left-color:#4caf50;"><p style="color:#4caf50;">✓ 未发现需求冲突</p></div>';return;}
      let html='';
      result.conflicts.forEach(c=>{html+='<div class="requirement-item conflict-item"><h4>⚠️ '+c.type+'</h4><p>'+c.message+'</p><p style="color:#f44336;font-size:0.9em;margin-top:8px;">💡 建议: '+c.suggestion+'</p></div>';});
      panel.innerHTML=html;
    }
    function showLoading(msg){
      document.getElementById('resultPanel').innerHTML='<div class="loading"><div class="spinner"></div><p>'+msg+'</p></div>';
    }
    function showError(msg){
      document.getElementById('resultPanel').innerHTML='<div class="requirement-item" style="border-left-color:#f44336;"><p style="color:#f44336;">❌ '+msg+'</p></div>';
    }
  </script>
</body>
</html>
