# Kubernetes Deployment - 前端
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ariba-frontend
  labels:
    app: ariba-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ariba-frontend
  template:
    metadata:
      labels:
        app: ariba-frontend
    spec:
      containers:
        - name: frontend
          image: ariba-assistant-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ariba-frontend
spec:
  selector:
    app: ariba-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
