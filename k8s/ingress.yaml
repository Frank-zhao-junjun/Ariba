# Kubernetes Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ariba-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - ariba.example.com
      secretName: ariba-tls
  rules:
    - host: ariba.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ariba-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ariba-frontend
                port:
                  number: 80
