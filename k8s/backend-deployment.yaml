# Kubernetes Deployment - 后端
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ariba-backend
  labels:
    app: ariba-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ariba-backend
  template:
    metadata:
      labels:
        app: ariba-backend
    spec:
      containers:
        - name: backend
          image: ariba-assistant-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: ARIBAS_LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ariba-backend
spec:
  selector:
    app: ariba-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
